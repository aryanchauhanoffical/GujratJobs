[build]
  base    = "client/"
  publish = "dist"
  command = "npm install && npm run build"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS    = "--legacy-peer-deps"

# SPA fallback — every unknown path serves index.html so React Router works
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
