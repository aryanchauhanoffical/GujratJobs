<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GujaratJobs</title>
    <script>
      window.addEventListener('error', function(e) {
        document.body.innerHTML += '<div style="color:red;z-index:9999;position:absolute;top:0;background:white;padding:10px;border:1px solid red;width:100%;"><b>' + e.message + '</b><br><pre>' + (e.error && e.error.stack ? e.error.stack : '') + '</pre></div>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.body.innerHTML += '<div style="color:red;z-index:9999;position:absolute;top:100px;background:white;padding:10px;border:1px solid red;width:100%;"><b>' + (e.reason ? e.reason.message : 'rejected') + '</b><br><pre>' + (e.reason && e.reason.stack ? e.reason.stack : '') + '</pre></div>';
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
