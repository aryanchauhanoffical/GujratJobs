version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: gujaratjobs_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: gujaratjobs
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - gujaratjobs_network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: gujaratjobs_server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://admin:password123@mongodb:27017/gujaratjobs?authSource=admin
      JWT_SECRET: your_super_secret_jwt_key_here
      JWT_REFRESH_SECRET: your_refresh_secret_here
      CLIENT_URL: http://localhost:3000
      COOKIE_SECURE: "false"
      APIFY_API_TOKEN: ${APIFY_API_TOKEN}
    ports:
      - "5001:5000"
    depends_on:
      - mongodb
    volumes:
      - ./server/uploads:/app/uploads
    networks:
      - gujaratjobs_network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: gujaratjobs_client
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5001/api
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - gujaratjobs_network

volumes:
  mongo_data:

networks:
  gujaratjobs_network:
    driver: bridge
